<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;">
  <title>ClipboardHistory</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24">
          <path fill="#4A90D9" d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/>
        </svg>
        <h1 class="title">剪贴板历史</h1>
      </div>
      <button class="settings-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path fill="#666" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </header>

    <!-- Tab栏 -->
    <nav class="tabs">
      <button class="tab active" data-tab="all">全部</button>
      <button class="tab" data-tab="text">文字</button>
      <button class="tab" data-tab="image">图片</button>
      <button class="tab" data-tab="file">文件</button>
    </nav>

    <!-- 搜索和过滤 -->
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索剪贴板历史...">
      <select class="date-filter" id="dateFilter">
        <option value="1">最近 1 天</option>
        <option value="3" selected>最近 3 天</option>
        <option value="5">最近 5 天</option>
        <option value="7">最近 7 天</option>
      </select>
    </div>

    <!-- 内容列表 -->
    <main class="content" id="contentList">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" width="48" height="48">
          <path fill="#ccc" d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/>
        </svg>
        <p>暂无剪贴板记录</p>
        <p class="hint">复制内容后会自动显示在这里</p>
      </div>
    </main>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <button class="close-btn" id="closeSettingsBtn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label>自动清理天数</label>
            <select id="retentionDays">
              <option value="1">1 天</option>
              <option value="3">3 天</option>
              <option value="5">5 天</option>
              <option value="7">7 天</option>
            </select>
          </div>
          <div class="setting-item">
            <label>
              <input type="checkbox" id="autoStart">
              开机自启动
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-primary" id="saveSettingsBtn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
